
services:
  # PostgreSQL database
  db:
    image: postgres:15
    container_name: ezportfolio-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: myportfolio_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # User backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  # ML backend
  ml-backend:
    build:
      context: ./ml-backend/ml_api
      dockerfile: Dockerfile
    container_name: ml-backend
    restart: always
    env_file:
      - ./ml-backend/ml_api/.env
    depends_on:
      - db
    ports:
      - "8001:8001"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ezportfolio-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ml-backend

volumes:
  db_data:
