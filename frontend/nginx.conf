# nginx.conf

server {
    listen 80;
    server_name _;

    # Przekierowanie HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/ezportfolio.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ezportfolio.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # React Router support
    location / {
        try_files $uri /index.html;
    }

    # Django backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }

    # ML backend
    location /ml/ {
        proxy_pass http://ml-backend:8001/ml/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }

    # Optional: Gzip
    gzip on;
    gzip_types text/plain application/javascript application/json text/css application/xml;
}
