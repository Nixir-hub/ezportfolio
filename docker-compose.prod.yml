services:
  db:
    image: postgres:15
    container_name: ezportfolio-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: myportfolio_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    expose:
      - "8000"

  ml-backend:
    build:
      context: ./ml-backend/ml_api
      dockerfile: Dockerfile
    container_name: ml-backend
    restart: always
    env_file:
      - ./ml-backend/ml_api/.env
    depends_on:
      - db
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ezportfolio-frontend
    restart: always
    depends_on:
      - backend
      - ml-backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    ports:
      - "8080:80"
      - "443:443"

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /usr/share/nginx/html; done"

volumes:
  db_data:
  certbot-etc:
  certbot-var:
